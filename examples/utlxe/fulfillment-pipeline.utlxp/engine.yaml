engine:
  name: fulfillment-pipeline-engine

  threads:
    sharedPoolSize: 16

  memory:
    maxHeap: 2g

  monitoring:
    health:
      port: 8083
      path: /health
    metrics:
      enabled: true
      prometheus:
        port: 9090
        path: /metrics

  defaultStrategy: TEMPLATE

# engine.yaml configures the engine only (name, threads, memory, monitoring,
# defaultStrategy). Per-transformation I/O is declared in
# transformations/<name>/transform.yaml.
#
# This transformation combines three input sources — a multipart pipeline envelope,
# a separately-correlated pricing response, and a constant shipping-config file. That
# input/transport wiring is a runtime concern (Dapr / Azure Service Bus · Event Hub —
# see EF06/EF10), declared outside engine.yaml, not here.
