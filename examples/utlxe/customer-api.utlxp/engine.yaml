engine:
  name: customer-api-engine

  threads:
    sharedPoolSize: 4

  memory:
    maxHeap: 512m

  monitoring:
    health:
      port: 8081
      path: /health
    metrics:
      enabled: false

  defaultStrategy: TEMPLATE

# engine.yaml configures the engine only (name, threads, memory, monitoring,
# defaultStrategy). Per-transformation I/O is declared in
# transformations/<name>/transform.yaml; messaging/transport wiring is a runtime
# concern (Dapr / Azure Service Bus · Event Hub — see EF06/EF10), not set here.
