engine:
  name: customer-api-engine

  threads:
    sharedPoolSize: 4

  memory:
    maxHeap: 512m

  monitoring:
    health:
      port: 8081
      path: /health
    metrics:
      enabled: false

  defaultStrategy: TEMPLATE

# Single transformation, stdio pipes (Phase 1)
pipes:
  normalize-order:
    inputs:
      - name: input
        transport: stdin
    output:
      transport: stdout
