engine:
  name: order-enrichment-engine

  threads:
    sharedPoolSize: 8

  memory:
    maxHeap: 1g

  monitoring:
    health:
      port: 8082
      path: /health
    metrics:
      enabled: false

  defaultStrategy: TEMPLATE

# Multi-input transformation: order + customers + inventory
# Phase 2+ will wire these to separate Pulsar topics.
# Phase 1: all inputs come from the .utlx header; engine processes via stdin.
pipes:
  enrich-order:
    inputs:
      - name: order
        transport: stdin
      - name: customers
        transport: stdin
      - name: inventory
        transport: stdin
    output:
      transport: stdout
