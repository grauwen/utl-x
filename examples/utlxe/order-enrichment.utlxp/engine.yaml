engine:
  name: order-enrichment-engine

  threads:
    sharedPoolSize: 8

  memory:
    maxHeap: 1g

  monitoring:
    health:
      port: 8082
      path: /health
    metrics:
      enabled: false

  defaultStrategy: TEMPLATE

# engine.yaml configures the engine only (name, threads, memory, monitoring,
# defaultStrategy). Per-transformation I/O (here: order + customers + inventory) is
# declared in transformations/<name>/transform.yaml; messaging/transport wiring is a
# runtime concern (Dapr / Azure Service Bus · Event Hub — see EF06/EF10), not set here.
