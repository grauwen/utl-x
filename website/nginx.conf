server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # VitePress uses cleanUrls (no .html in links) → try the .html file for a clean path.
    # Genuinely missing pages return a real 404 (=404), then error_page shows the custom page
    # — serving 404.html directly here would (wrongly) return HTTP 200 for missing URLs.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long-cache fingerprinted static assets.
    location ~* \.(?:js|css|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    error_page 404 /404.html;

    # Light security headers (static site).
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
}
