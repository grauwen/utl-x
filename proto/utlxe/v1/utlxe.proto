syntax = "proto3";
package utlxe.v1;

option java_package = "org.apache.utlx.engine.proto";
option java_multiple_files = true;
option java_outer_classname = "UtlxeProto";

// ─── Init-time messages (called once per transformation at startup) ───

message LoadTransformationRequest {
  string transformation_id = 1;    // Unique ID (e.g., connection ID from pipeline descriptor)
  string utlx_source = 2;         // The .utlx mapping definition source code
  string strategy = 3;            // "TEMPLATE", "COPY", "COMPILED", "AUTO" (default: "AUTO")
  string validation_policy = 4;   // "STRICT", "WARN", "SKIP" (default: "SKIP")
  int32 max_concurrent = 5;       // Per-transformation concurrency limit (0 = use engine default)
  map<string, string> config = 6; // Additional configuration (validation settings, format hints, etc.)

  // Schema pass-through: lets the caller (e.g., Open-M wrapper) provide schemas
  // from the control plane's schema store. UTLXe uses them for:
  //   - PRE_VALIDATION  (input against schema)
  //   - POST_VALIDATION (output against output_schema)
  //   - COPY strategy skeleton building (type-aware UDM construction)
  // When empty, UTLXe falls back to schemas from the bundle or no validation.
  //
  // Input schemas are maps because N-input mappings have one schema per named input.
  // Keys match the named_inputs keys in ExecuteRequest.
  // "current" (or the primary input name) = main payload input.
  map<string, bytes> input_schemas = 7;          // name → schema content (native format)
  map<string, string> input_schema_formats = 8;  // name → "xsd" / "json-schema" / "avro"
  bytes output_schema = 9;                       // Schema of the output (downstream component's expected input)
  string output_schema_format = 10;              // "xsd", "json-schema", "avro"
}

message LoadTransformationResponse {
  bool success = 1;
  string error = 2;                         // Non-empty if success=false
  repeated ValidationError warnings = 3;    // Type-check warnings (non-fatal)
  LoadMetrics metrics = 4;                  // Compilation timing
}

message LoadMetrics {
  int64 parse_duration_us = 1;     // Microseconds for lexer + parser
  int64 typecheck_duration_us = 2; // Microseconds for type checker
  int64 total_duration_us = 3;     // Total init time
}

// ─── Bundle operations (load/unload an entire bundle of transformations + schemas) ───

message LoadBundleRequest {
  string bundle_id = 1;                   // Bundle identifier (e.g., "orders-v3")
  bytes bundle_data = 2;                  // ZIP contents (inline upload)
  string bundle_uri = 3;                  // URI to fetch from (alternative to inline: blob://, file://)
}

message LoadBundleResponse {
  bool success = 1;
  string error = 2;
  string version = 3;                     // Bundle version (from engine.yaml or auto-generated)
  string checksum = 4;                    // SHA-256 of the bundle
  int32 transformations_loaded = 5;
  repeated string transformation_ids = 6; // Names of transformations in the bundle
  LoadMetrics metrics = 7;
}

message UnloadBundleRequest {
  string bundle_id = 1;
}

message UnloadBundleResponse {
  bool success = 1;
  string error = 2;
  int32 transformations_unloaded = 3;
}

// ─── Runtime messages (called per message on the hot path) ───

message ExecuteRequest {
  string transformation_id = 1;    // Which pre-loaded transformation to execute
  bytes payload = 2;               // The current_payload from MPPM envelope
  string content_type = 3;         // "application/json", "application/xml", "text/csv", etc.
  map<string, bytes> named_inputs = 4; // For N-input mappings: named payloads from step window
  string correlation_id = 5;       // Business correlation ID — preserved across the entire chain
  string message_id = 6;           // UUIDv7 — unique ID for this message (caller sets, or engine generates)
  string causation_id = 7;         // UUIDv7 — MessageId of the message that caused this one
  map<string, string> metadata = 8; // Custom properties to forward (e.g., Service Bus, CPI exchange, Kafka headers)
  string traceparent = 9;          // W3C Trace Context traceparent header
  map<string, string> parameters = 10; // Transformation input parameters (accessible as $params.key in .utlx)
  MetadataForwarding metadata_forwarding = 11; // Controls which metadata keys pass through to output
  string tracestate = 12;          // W3C Trace Context tracestate header (vendor extensions)
}

message ExecuteResponse {
  bool success = 1;
  bytes output = 2;                         // Transformed payload
  string output_content_type = 3;           // Output format
  string error = 4;                         // Non-empty if success=false
  ErrorClass error_class = 5;               // PERMANENT or TRANSIENT
  repeated ValidationError validation_errors = 6;
  ExecuteMetrics metrics = 7;
  ErrorPhase error_phase = 8;              // WHERE the error occurred
  string correlation_id = 9;              // Echoed from request (for multiplexed matching)
  string message_id = 10;                 // New UUID for this output message
  string causation_id = 11;              // Set to input's message_id (immediate parent)
  map<string, string> metadata = 12;     // Forwarded custom properties (controlled by metadata_forwarding)
  ErrorCode error_code = 13;             // Specific, actionable error code
  OutputMetadata output_metadata = 14;   // Rule-emitted business metadata (typed, host-neutral)
}

// Rule-emitted output metadata. Distinct from the flat `metadata` map (which is
// pass-through of input properties). This shape carries business-meaningful
// identifiers that host adapters map to host-specific scopes:
//   CPI:       application_id → SAP_ApplicationID, message_type → SAP_MessageType
//   BizTalk:   application_id → promoted property, custom_identifiers → context
//   Dapr:      application_id → CloudEvents ce-subject, message_type → ce-type
//   Kafka:     custom_identifiers → message headers
message OutputMetadata {
  string application_id = 1;             // Business document ID (PO number, IDoc number, invoice ID)
  string message_type = 2;              // Logical type the rule produced ("CanonicalOrder.v3", "DEBMAS05")
  string custom_status = 3;             // Non-fatal status ("FALLBACK_RULE_USED", "PARTIAL_MATCH")
  map<string, string> custom_identifiers = 4; // Additional searchable IDs (DeliveryNumber, CustomerNumber)
  string sender = 5;                    // Logical sender (resolved from payload, e.g., EDI ISA06)
  string receiver = 6;                  // Logical receiver (resolved from payload, e.g., EDI ISA08)
}

// Controls which input metadata keys pass through to the output.
enum MetadataForwarding {
  METADATA_FORWARDING_UNSPECIFIED = 0;  // Engine default (forward all)
  METADATA_FORWARD_ALL = 1;            // Forward all input metadata to output
  METADATA_FORWARD_NONE = 2;           // Drop all input metadata (only output_metadata survives)
  METADATA_FORWARD_CORRELATION = 3;    // Forward only correlation/message/causation IDs, drop rest
}

enum ErrorClass {
  ERROR_CLASS_UNSPECIFIED = 0;
  PERMANENT = 1;   // Missing field, type coercion failure — do not retry
  TRANSIENT = 2;   // Expression error (e.g., division by zero) — retryable
}

enum ErrorPhase {
  ERROR_PHASE_UNSPECIFIED = 0;
  PRE_VALIDATION = 1;     // Input schema validation failed
  TRANSFORMATION = 2;     // utl-x execution failed
  POST_VALIDATION = 3;    // Output schema validation failed
  INTERNAL = 4;           // UTLXe engine error (not payload-related)
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  TRANSFORMATION_NOT_FOUND = 1;      // transformation_id doesn't exist in the registry
  BUNDLE_NOT_LOADED = 2;             // bundle_id not loaded
  INPUT_PARSE_FAILED = 3;            // payload can't be parsed (bad JSON/XML/CSV)
  INPUT_VALIDATION_FAILED = 4;       // input doesn't match schema (pre-validation)
  TRANSFORMATION_FAILED = 5;         // runtime error in .utlx (null ref, type mismatch, etc.)
  OUTPUT_VALIDATION_FAILED = 6;      // output doesn't match schema (post-validation)
  OUTPUT_SERIALIZATION_FAILED = 7;   // output can't be serialized to target format
  MAX_CONCURRENT_EXCEEDED = 8;       // maxConcurrent limit reached, request rejected
  MAX_INPUT_SIZE_EXCEEDED = 9;       // payload exceeds maxInputSize
  INTERNAL_ERROR = 10;               // engine-internal error (not payload-related)
}

message ValidationError {
  string message = 1;
  string path = 2;       // JSONPath or XPath to the problematic field
  string severity = 3;   // "ERROR", "WARNING"
}

message ExecuteMetrics {
  int64 execute_duration_us = 1;  // Microseconds for this execution
}

// ─── Batch execution (same transformation, multiple inputs) ───

message ExecuteBatchRequest {
  string transformation_id = 1;
  repeated BatchItem items = 2;
}

message BatchItem {
  bytes payload = 1;
  string content_type = 2;
  map<string, bytes> named_inputs = 3;
  string correlation_id = 4;
  string message_id = 5;
  string causation_id = 6;
  map<string, string> metadata = 7;
  map<string, string> parameters = 8;
  string traceparent = 9;             // W3C Trace Context per batch item (each item = own span)
  string tracestate = 10;             // W3C Trace Context vendor extensions
}

message ExecuteBatchResponse {
  repeated ExecuteResponse results = 1;
}

// ─── Pipeline execution (chained transformations, in-process UDM hand-off) ───

// Additional inputs for a specific pipeline stage (keyed by transformation_id in the request)
message PipelineStageInputs {
  map<string, bytes> additional_inputs = 1; // Named inputs for this stage (e.g., "customers" → JSON, "pricelist" → CSV)
}

message ExecutePipelineRequest {
  repeated string transformation_ids = 1;  // Ordered list: output of [0] feeds input of [1], etc.
  bytes payload = 2;                       // Initial input payload
  string content_type = 3;
  string correlation_id = 4;
  string message_id = 5;                   // UUIDv7 — unique for this pipeline invocation
  string causation_id = 6;                 // UUIDv7 — parent's MessageId
  map<string, string> metadata = 7;        // Custom properties to forward
  string traceparent = 8;                  // W3C Trace Context
  map<string, PipelineStageInputs> stage_inputs = 9; // EF01: additional inputs per stage, keyed by transformation_id
  map<string, string> parameters = 10; // Transformation input parameters (shared across all stages)
  string tracestate = 11;             // W3C Trace Context vendor extensions
}

message ExecutePipelineResponse {
  bool success = 1;
  bytes output = 2;                         // Final output (from last transformation in chain)
  string output_content_type = 3;
  string error = 4;
  ErrorClass error_class = 5;
  ErrorPhase error_phase = 6;
  repeated ValidationError validation_errors = 7;
  string correlation_id = 8;
  int32 stages_completed = 9;              // How many transforms completed before error (or total)
  int64 total_duration_us = 10;            // Wall clock for entire pipeline
  string message_id = 11;                 // New UUID for the final output
  string causation_id = 12;              // MessageId of the last stage's input
  map<string, string> metadata = 13;     // Forwarded custom properties
  ErrorCode error_code = 14;             // Specific error code (if failed)
  OutputMetadata output_metadata = 15;   // Rule-emitted business metadata (from last pipeline stage)
}

// ─── Lifecycle messages ───

message UnloadTransformationRequest {
  string transformation_id = 1;
}

message UnloadTransformationResponse {
  bool success = 1;
}

message HealthRequest {}

message HealthResponse {
  string state = 1;                  // "READY", "RUNNING", "DRAINING", etc.
  int64 uptime_ms = 2;
  int32 loaded_transformations = 3;
  int64 total_executions = 4;
  int64 total_errors = 5;
}

// ─── stdio-proto envelope (not used in gRPC mode) ───

message StdioEnvelope {
  MessageType type = 1;
  bytes payload = 2;  // Serialised inner message (one of the types above)
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;

  // Requests (wrapper → UTLXe)
  LOAD_TRANSFORMATION_REQUEST = 1;
  EXECUTE_REQUEST = 2;
  EXECUTE_BATCH_REQUEST = 3;
  UNLOAD_TRANSFORMATION_REQUEST = 4;
  HEALTH_REQUEST = 5;
  EXECUTE_PIPELINE_REQUEST = 6;
  LOAD_BUNDLE_REQUEST = 7;
  UNLOAD_BUNDLE_REQUEST = 8;

  // Responses (UTLXe → wrapper)
  LOAD_TRANSFORMATION_RESPONSE = 11;
  EXECUTE_RESPONSE = 12;
  EXECUTE_BATCH_RESPONSE = 13;
  UNLOAD_TRANSFORMATION_RESPONSE = 14;
  HEALTH_RESPONSE = 15;
  EXECUTE_PIPELINE_RESPONSE = 16;
  LOAD_BUNDLE_RESPONSE = 17;
  UNLOAD_BUNDLE_RESPONSE = 18;
}

// ─── gRPC service definition (for --mode=grpc only) ───

service UtlxeService {
  // Transformation lifecycle
  rpc LoadTransformation(LoadTransformationRequest) returns (LoadTransformationResponse);
  rpc UnloadTransformation(UnloadTransformationRequest) returns (UnloadTransformationResponse);

  // Bundle lifecycle
  rpc LoadBundle(LoadBundleRequest) returns (LoadBundleResponse);
  rpc UnloadBundle(UnloadBundleRequest) returns (UnloadBundleResponse);

  // Execution
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc ExecuteBatch(ExecuteBatchRequest) returns (ExecuteBatchResponse);
  rpc ExecutePipeline(ExecutePipelineRequest) returns (ExecutePipelineResponse);

  // Health
  rpc Health(HealthRequest) returns (HealthResponse);
}
