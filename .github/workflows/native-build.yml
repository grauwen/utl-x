name: Build Native Binaries

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary: utlx
          - os: macos-latest
            platform: macos-arm64
            binary: utlx
          - os: windows-latest
            platform: windows-x64
            binary: utlx.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17 (for Gradle toolchain)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build native binary (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :modules:cli:nativeCompile

      - name: Build native binary (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :modules:cli:nativeCompile

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: ./modules/cli/build/native/nativeCompile/${{ matrix.binary }} --version

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: .\modules\cli\build\native\nativeCompile\${{ matrix.binary }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: utlx-${{ matrix.platform }}
          path: modules/cli/build/native/nativeCompile/${{ matrix.binary }}
