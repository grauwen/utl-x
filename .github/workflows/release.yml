name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.2)'
        required: true
        type: string

jobs:
  # Reuse the existing native-build workflow
  build:
    uses: ./.github/workflows/native-build.yml
    secrets: inherit

  # Create release with the built artifacts
  create-release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Rename binaries for release
        run: |
          cp artifacts/utlx-linux-x64/utlx utlx-linux-x64
          cp artifacts/utlx-macos-arm64/utlx utlx-macos-arm64
          cp artifacts/utlx-windows-x64/utlx.exe utlx-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: UTL-X ${{ inputs.version }}
          body: |
            ## UTL-X ${{ inputs.version }}

            ### Native Binaries

            | Platform | Download |
            |----------|----------|
            | Linux x64 | `utlx-linux-x64` |
            | macOS ARM64 | `utlx-macos-arm64` |
            | Windows x64 | `utlx-windows-x64.exe` |

            ### Installation

            ```bash
            # Linux / macOS
            chmod +x utlx-*
            sudo mv utlx-* /usr/local/bin/utlx
            utlx --version
            ```
          files: |
            utlx-linux-x64
            utlx-macos-arm64
            utlx-windows-x64.exe
