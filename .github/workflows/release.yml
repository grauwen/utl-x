name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary: utlx
          - os: macos-latest
            platform: macos-arm64
            binary: utlx
          - os: windows-latest
            platform: windows-x64
            binary: utlx.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17 (for Gradle toolchain)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build native binary (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :modules:cli:nativeCompile

      - name: Build native binary (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :modules:cli:nativeCompile "-Porg.gradle.java.installations.fromEnv=JAVA_HOME_17_X64"

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: ./modules/cli/build/native/nativeCompile/${{ matrix.binary }} --version

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: .\modules\cli\build\native\nativeCompile\${{ matrix.binary }} --version

      - name: Rename binary for release
        shell: bash
        run: |
          cp modules/cli/build/native/nativeCompile/${{ matrix.binary }} utlx-${{ matrix.platform }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: utlx-${{ matrix.platform }}
          path: utlx-${{ matrix.platform }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  create-release:
    needs: build-native
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: UTL-X ${{ inputs.version }}
          body: |
            ## UTL-X ${{ inputs.version }}

            ### Native Binaries

            | Platform | Download |
            |----------|----------|
            | Linux x64 | `utlx-linux-x64` |
            | macOS ARM64 | `utlx-macos-arm64` |
            | Windows x64 | `utlx-windows-x64.exe` |

            ### Installation

            ```bash
            # Linux / macOS
            chmod +x utlx-*
            sudo mv utlx-* /usr/local/bin/utlx
            utlx --version
            ```
          files: |
            artifacts/utlx-linux-x64/*
            artifacts/utlx-macos-arm64/*
            artifacts/utlx-windows-x64/*
