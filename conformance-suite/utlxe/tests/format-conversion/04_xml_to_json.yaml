name: "xml_to_json"
category: "format-conversion"
description: "XML input to JSON output — XML sent as string payload to engine"
tags: ["xml", "json", "format-conversion"]
skip: true
skip_reason: "XML input via stdio-proto needs format-aware payload handling — tracked for fix"

input:
  format: xml
  data: |
    <?xml version="1.0" encoding="UTF-8"?>
    <employee>
      <id>E001</id>
      <name>Alice Smith</name>
      <department>Engineering</department>
      <salary>95000</salary>
    </employee>

transformation: |
  %utlx 1.0
  input xml
  output json
  ---
  {
    employeeId: $input.employee.id,
    name: $input.employee.name,
    dept: $input.employee.department,
    salary: number($input.employee.salary)
  }

expected:
  format: json
  data: |
    {"employeeId": "E001", "name": "Alice Smith", "dept": "Engineering", "salary": 95000}
