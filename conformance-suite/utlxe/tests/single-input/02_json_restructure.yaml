name: "json_restructure"
category: "single-input"
description: "JSON restructuring with stdlib functions — concat, lowerCase, computed boolean"
tags: ["json", "stdlib", "concat", "lowerCase", "computed"]

input:
  format: json
  data: |
    {"firstName": "Marcel", "lastName": "Grauwen", "email": "MARCEL@GLOMIDCO.COM", "age": 45}

transformation: |
  %utlx 1.0
  input json
  output json
  ---
  {
    fullName: concat($input.firstName, " ", $input.lastName),
    email: lowerCase($input.email),
    age: $input.age,
    isAdult: $input.age >= 18
  }

expected:
  format: json
  data: |
    {"fullName": "Marcel Grauwen", "email": "marcel@glomidco.com", "age": 45, "isAdult": true}
