name: "engine_info"
category: "admin-api"
description: "Verify GET /admin/info returns engine version, uptime, transformation count"
tags: ["admin-api", "info", "operational"]
transport: http

admin_api:
  steps:
    - action: upload_transformation
      name: "dummy"
      source: |
        %utlx 1.0
        input json
        output json
        ---
        $input

