name: "concurrent_transform_1000"
category: "throughput"
description: "1000 messages with real transformation fired concurrently"
tags: ["throughput", "concurrent", "high-volume", "stdlib"]

transformation: |
  %utlx 1.0
  input json
  output json
  ---
  {
    fullName: concat($input.firstName, " ", $input.lastName),
    email: lowerCase($input.email),
    isAdult: $input.age >= 18,
    category: if ($input.age >= 65) "senior"
              else if ($input.age >= 18) "adult"
              else "minor"
  }

burst:
  count: 1000
  mode: "concurrent"
  payload_template: |
    {"firstName": "User", "lastName": "Nr{{INDEX}}", "email": "USER{{INDEX}}@EXAMPLE.COM", "age": {{AGE}}}
  age_range: [10, 80]
  content_type: "application/json"

throughput_limits:
  max_total_ms: 30000
