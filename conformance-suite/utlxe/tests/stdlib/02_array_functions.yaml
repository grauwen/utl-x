name: "stdlib_array_functions"
category: "stdlib"
description: "Test array stdlib functions through the engine"
tags: ["stdlib", "array", "map", "filter", "reduce"]

input:
  format: json
  data: |
    {"numbers": [5, 3, 8, 1, 9, 2, 7, 4, 6], "names": ["Charlie", "Alice", "Bob"]}

transformation: |
  %utlx 1.0
  input json
  output json
  ---
  {
    count: size($input.numbers),
    sum: sum($input.numbers),
    min: min($input.numbers),
    max: max($input.numbers),
    avg: avg($input.numbers),
    sorted: sort($input.names),
    reversed: reverse($input.numbers),
    first: first($input.numbers),
    last: last($input.numbers),
    doubled: map($input.numbers, (n) -> n * 2),
    evens: filter($input.numbers, (n) -> n % 2 == 0),
    flat: flatten([[1, 2], [3, 4], [5]])
  }

expected:
  format: json
  data: |
    {
      "count": 9,
      "sum": 45,
      "min": 1,
      "max": 9,
      "avg": 5.0,
      "sorted": ["Alice", "Bob", "Charlie"],
      "reversed": [6, 4, 7, 2, 9, 1, 8, 3, 5],
      "first": 5,
      "last": 6,
      "doubled": [10, 6, 16, 2, 18, 4, 14, 8, 12],
      "evens": [8, 2, 4, 6],
      "flat": [1, 2, 3, 4, 5]
    }
