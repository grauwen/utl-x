name: "f08_roundtrip_xsd_jsch_xsd"
category: "formats/xsd/basic"
description: "F08: XSD → JSON Schema → XSD round-trip preserves type structure"
tags: ["xsd", "jsch", "usdl", "f08", "roundtrip"]

input:
  format: xsd
  data: |
    <?xml version="1.0" encoding="UTF-8"?>
    <xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema">
      <xs:complexType name="Order">
        <xs:sequence>
          <xs:element name="id" type="xs:string"/>
          <xs:element name="total" type="xs:decimal"/>
        </xs:sequence>
      </xs:complexType>
    </xs:schema>

transformation: |
  %utlx 1.0
  input xsd
  output json
  ---
  {
    typeName: keys($input["%types"])[0],
    fieldCount: count($input["%types"].Order["%fields"]),
    fieldNames: map($input["%types"].Order["%fields"], (f) -> f["%name"])
  }

expected:
  format: json
  data: |
    {
      "typeName": "Order",
      "fieldCount": 2,
      "fieldNames": ["id", "total"]
    }
