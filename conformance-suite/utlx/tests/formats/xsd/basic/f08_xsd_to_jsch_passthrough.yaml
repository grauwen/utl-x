name: "f08_xsd_to_jsch_passthrough"
category: "formats/xsd/basic"
description: "F08: XSD input → JSON Schema output via USDL passthrough"
tags: ["xsd", "jsch", "usdl", "f08", "schema-conversion"]

input:
  format: xsd
  data: |
    <?xml version="1.0" encoding="UTF-8"?>
    <xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema">
      <xs:complexType name="Order">
        <xs:sequence>
          <xs:element name="id" type="xs:string"/>
          <xs:element name="total" type="xs:decimal"/>
        </xs:sequence>
      </xs:complexType>
    </xs:schema>

transformation: |
  %utlx 1.0
  input xsd
  output jsch
  ---
  $input

expected:
  format: json
  data: |
    {
      "$schema": "https://json-schema.org/draft/2020-12/schema",
      "$defs": {
        "Order": {
          "type": "object",
          "properties": {
            "id": {
              "type": "string"
            },
            "total": {
              "type": "string"
            }
          },
          "required": [
            "id",
            "total"
          ]
        }
      }
    }
