name: "f08_jsch_usdl_dual_access"
category: "formats/jsch/basic"
description: "F08: JSON Schema input has both raw JSON access and USDL % properties"
tags: ["jsch", "usdl", "f08", "enrichment"]

input:
  format: jsch
  data: |
    {
      "type": "object",
      "properties": {
        "name": {"type": "string"},
        "age": {"type": "integer"}
      },
      "required": ["name"]
    }

transformation: |
  %utlx 1.0
  input jsch
  output json
  ---
  {
    rawType: $input.type,
    usdlTypeName: keys($input["%types"])[0],
    diagnosticStatus: $input["%_diagnostics"]["%_status"]
  }

expected:
  format: json
  data: |
    {
      "rawType": "object",
      "usdlTypeName": "Root",
      "diagnosticStatus": "complete"
    }
