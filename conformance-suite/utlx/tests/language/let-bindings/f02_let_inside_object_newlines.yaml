name: "f02_let_inside_object_newlines"
category: "language/let-bindings"
description: "F02: let bindings inside object body separated by newlines only (no commas)"
tags: ["let", "syntax", "newline", "f02"]

input:
  format: json
  data: |
    {"x": 10}

transformation: |
  %utlx 1.0
  input json
  output json
  ---
  {
    let a = $input.x
    let b = a * 2
    result: a + b
  }

expected:
  format: json
  data: |
    {"result": 30}
