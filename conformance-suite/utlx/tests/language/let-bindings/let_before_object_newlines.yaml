name: "let_before_object_newlines"
category: "language/let-bindings"
description: "let bindings before object body, separated by newlines (top-level)"
tags: ["let", "syntax", "newline", "f02-baseline"]

input:
  format: json
  data: |
    {"x": 10}

transformation: |
  %utlx 1.0
  input json
  output json
  ---
  let a = $input.x
  let b = a * 2
  let c = b + 1
  {
    a: a,
    b: b,
    c: c
  }

expected:
  format: json
  data: |
    {"a": 10, "b": 20, "c": 21}
